<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美伊衝突：多視角論述生成系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 載入動畫 */
    .spinner {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-4 md:p-8">

  <div class="max-w-6xl mx-auto space-y-6">
    <!-- Header -->
    <header class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <h1 class="text-2xl md:text-3xl font-bold text-slate-900 flex items-center gap-3">
        <!-- Globe Icon -->
        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        美伊衝突：多視角論述生成系統
      </h1>
      <p class="mt-2 text-slate-600">
        請輸入您希望探討的焦點與發言視角（例如：扮演美國官方談論核協議），系統將自動為您生成講稿，幫助理解國際事件的多元面向。
      </p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- 左側：提示詞輸入 -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col h-full min-h-[500px]">
        <h2 class="text-lg font-semibold border-b pb-4 mb-4 flex items-center gap-2">
          <!-- Book Icon -->
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
          輸入提示詞
        </h2>
        <textarea
          id="inputText"
          placeholder="請輸入老師提供的AI視角提示詞卡的內容。"
          class="flex-1 w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none transition-all placeholder:text-slate-400 mb-4"
        ></textarea>
        <button
          id="generateBtn"
          onclick="handleGenerate()"
          class="w-full py-4 px-4 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-medium rounded-xl flex items-center justify-center gap-2 transition-colors shadow-sm text-lg"
        >
          <span id="btnIcon">
            <!-- Send Icon -->
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
          </span>
          <span id="btnText">生成文章</span>
        </button>
      </div>

      <!-- 右側：生成結果 -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col h-full min-h-[500px]">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
          <h2 class="text-lg font-semibold flex items-center gap-2">
            <!-- Shield Icon -->
            <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            生成結果預覽
          </h2>
          <button
            id="copyBtn"
            onclick="handleCopy()"
            disabled
            class="flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all text-slate-400 bg-slate-50 cursor-not-allowed"
          >
            <span id="copyIcon">
              <!-- Copy Icon -->
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            </span>
            <span id="copyText">複製文章</span>
          </button>
        </div>

        <div class="flex-1 bg-slate-50 rounded-xl p-6 border border-slate-100 overflow-y-auto relative whitespace-pre-wrap leading-relaxed text-slate-700">
          <div id="outputText" class="hidden"></div>
          <div id="placeholderUI" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 space-y-4">
            <svg class="w-12 h-12 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            <p>在此顯示生成的文章內容</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== 老師請注意：在此處填入您的 API Key ==========
    const API_KEY = "AIzaSyCcGtaQJB_j6pYslWM7HzfH2jpAlNaIFa0"; 
    // =======================================================

    // 取得 DOM 元素
    const inputEl = document.getElementById('inputText');
    const generateBtn = document.getElementById('generateBtn');
    const btnIcon = document.getElementById('btnIcon');
    const btnText = document.getElementById('btnText');
    const outputEl = document.getElementById('outputText');
    const placeholderUI = document.getElementById('placeholderUI');
    const copyBtn = document.getElementById('copyBtn');
    const copyIcon = document.getElementById('copyIcon');
    const copyText = document.getElementById('copyText');

    let currentGeneratedText = "";

    // 監聽輸入框變化以啟用/停用按鈕
    inputEl.addEventListener('input', () => {
      if (inputEl.value.trim() === "") {
        generateBtn.disabled = true;
      } else {
        generateBtn.disabled = false;
      }
    });

    async function handleGenerate() {
      const text = inputEl.value.trim();
      if (!text) return;

      if (!API_KEY) {
        alert("老師您好！請記得先在檔案中的 API_KEY 欄位填入您的金鑰喔！");
        return;
      }

      // 設置載入中狀態
      inputEl.disabled = true;
      generateBtn.disabled = true;
      btnText.innerText = "正在生成文章...";
      btnIcon.innerHTML = `<svg class="w-5 h-5 spinner" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`;
      
      const systemInstruction = `你是一個專門協助學生理解國際地緣政治的 AI 助教。
請根據使用者輸入的提示詞設定（包含發言角色與討論焦點），以繁體中文（台灣習慣用語）輸出。
你的任務是撰寫一篇關於「美伊衝突」的發言文章。
必須完全投入使用者設定的角色立場，展現其情感、邏輯與訴求。
字數約 300-500 字，結構建議包含：立場宣告、對當前局勢的看法、具體訴求或結論。`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: text }] }],
            systemInstruction: { parts: [{ text: systemInstruction }] },
            generationConfig: { temperature: 0.7 }
          })
        });

        if (!response.ok) throw new Error('API Request Failed');
        const data = await response.json();
        
        currentGeneratedText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
        
        if (currentGeneratedText) {
          outputEl.innerText = currentGeneratedText;
          outputEl.classList.remove('hidden');
          placeholderUI.classList.add('hidden');
          
          // 啟用複製按鈕
          copyBtn.disabled = false;
          copyBtn.className = "flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all bg-slate-100 hover:bg-slate-200 text-slate-700";
        } else {
          outputEl.innerText = "【系統提示】生成失敗，請檢查提示詞或稍後再試。";
          outputEl.classList.remove('hidden');
          placeholderUI.classList.add('hidden');
        }

      } catch (error) {
        console.error(error);
        outputEl.innerText = "【系統提示】連線發生錯誤，無法取得模型回應。請確認網路狀態或稍後重試。";
        outputEl.classList.remove('hidden');
        placeholderUI.classList.add('hidden');
      } finally {
        // 恢復按鈕狀態
        inputEl.disabled = false;
        generateBtn.disabled = false;
        btnText.innerText = "生成文章";
        btnIcon.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>`;
      }
    }

    function handleCopy() {
      if (!currentGeneratedText) return;
      
      const textArea = document.createElement("textarea");
      textArea.value = currentGeneratedText;
      document.body.appendChild(textArea);
      textArea.select();
      try {
        document.execCommand('copy');
        
        // 複製成功的 UI 變化
        copyBtn.className = "flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all bg-emerald-100 text-emerald-700";
        copyIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
        copyText.innerText = "已複製！";
        
        setTimeout(() => {
          copyBtn.className = "flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all bg-slate-100 hover:bg-slate-200 text-slate-700";
          copyIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>`;
          copyText.innerText = "複製文章";
        }, 2000);
      } catch (err) {
        console.error('複製失敗', err);
      }
      document.body.removeChild(textArea);
    }
  </script>
</body>
</html>
