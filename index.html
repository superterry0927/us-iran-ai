<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 視角探索器：美國與伊朗衝突</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 自訂滾動條，讓介面更精緻 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- 頂部導覽列 -->
    <header class="bg-blue-900 text-white shadow-md py-4 px-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-globe text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wider">AI 視角探索器 <span class="text-blue-300 text-sm ml-2">教學專用系統</span></h1>
        </div>
        <div class="text-sm bg-blue-800 px-3 py-1 rounded-full border border-blue-700">
            探討主題：美國與伊朗衝突
        </div>
    </header>

    <!-- 主要內容區：左右兩欄 (響應式) -->
    <main class="flex-grow p-4 md:p-6 lg:p-8 flex flex-col lg:flex-row gap-6 max-w-7xl mx-auto w-full">
        
        <!-- 左欄：提示詞控制區 -->
        <section class="w-full lg:w-1/2 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col">
            <h2 class="text-lg font-bold mb-4 border-b border-slate-100 pb-2 flex items-center gap-2">
                <i class="fa-solid fa-pen-nib text-blue-600"></i> 提示詞設定區
            </h2>

            <!-- 提示詞輸入區 -->
            <div class="flex-grow flex flex-col mb-4">
                <label for="promptInput" class="block text-sm font-semibold text-slate-700 mb-2">
                    發言文章提示詞 (Prompt)：
                </label>
                <textarea id="promptInput" 
                          class="w-full flex-grow min-h-[200px] p-4 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-none text-slate-700 leading-relaxed"
                          placeholder="請輸入你要讓 AI 生成文章的指示。例如：請以 [某個角色] 的語氣，撰寫一篇關於近期美伊衝突的評論，字數約300字..."></textarea>
            </div>

            <!-- 生成按鈕 -->
            <button id="generateBtn" onclick="handleGenerate()" 
                    class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> 產生視角文章
            </button>
        </section>

        <!-- 右欄：生成結果顯示區 -->
        <section class="w-full lg:w-1/2 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col relative">
            <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-2">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-file-lines text-slate-600"></i> AI 生成結果
                </h2>
                <!-- 複製按鈕 -->
                <button id="copyBtn" onclick="copyResult()" disabled
                        class="px-4 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-semibold rounded-lg transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa-regular fa-copy"></i> <span id="copyText">複製結果</span>
                </button>
            </div>

            <!-- 結果顯示框 -->
            <div id="resultContainer" class="w-full flex-grow bg-slate-50 border border-slate-200 rounded-xl p-5 overflow-y-auto relative min-h-[300px]">
                
                <!-- 初始狀態 / 空白狀態 -->
                <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400">
                    <i class="fa-solid fa-robot text-4xl mb-3 text-slate-300"></i>
                    <p>等待生成中...</p>
                    <p class="text-sm mt-1">調整左側提示詞以體驗不同視角</p>
                </div>

                <!-- 載入中狀態 -->
                <div id="loadingState" class="absolute inset-0 flex flex-col items-center justify-center text-blue-600 hidden bg-slate-50/80 backdrop-blur-sm z-10 rounded-xl">
                    <div class="loader mb-3"></div>
                    <p class="font-semibold animate-pulse">AI 正在分析視角並撰寫文章...</p>
                </div>

                <!-- 錯誤訊息狀態 -->
                <div id="errorState" class="hidden text-red-600 p-4 bg-red-50 rounded-lg border border-red-200">
                    <p class="font-bold flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation"></i> 發生錯誤</p>
                    <p id="errorMessage" class="text-sm mt-2"></p>
                </div>

                <!-- 實際文字結果 -->
                <div id="outputText" class="text-slate-800 leading-loose whitespace-pre-wrap hidden"></div>
            </div>
            
            <!-- 隱藏的 textarea 專門用來執行相容性複製 -->
            <textarea id="hiddenCopyArea" class="sr-only" aria-hidden="true"></textarea>
        </section>
    </main>

    <footer class="text-center py-4 text-slate-500 text-sm">
        <p>此系統僅供教育與學術探討使用，展示 AI 模型在不同提示詞下的視角差異。</p>
    </footer>

    <script>
        // --- 系統設定 ---
        const canvasApiKey = "AIzaSyDbbnFiPxFCV5"+"LMs2ExL7ONBhleO9zeu4s"; // 💡 教師請直接將您的 Gemini API 金鑰貼在引號內替換掉 YOUR_API_KEY_HERE
        
        // --- UI 互動邏輯 ---
        function showUIState(state, message = '') {
            const emptyState = document.getElementById('emptyState');
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const outputText = document.getElementById('outputText');
            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');

            // 隱藏所有
            emptyState.classList.add('hidden');
            loadingState.classList.add('hidden');
            errorState.classList.add('hidden');
            outputText.classList.add('hidden');
            copyBtn.disabled = true;

            switch(state) {
                case 'loading':
                    loadingState.classList.remove('hidden');
                    generateBtn.disabled = true;
                    generateBtn.classList.add('opacity-70', 'cursor-not-allowed');
                    break;
                case 'success':
                    outputText.classList.remove('hidden');
                    outputText.innerText = message;
                    copyBtn.disabled = false;
                    generateBtn.disabled = false;
                    generateBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                    break;
                case 'error':
                    errorState.classList.remove('hidden');
                    document.getElementById('errorMessage').innerText = message;
                    generateBtn.disabled = false;
                    generateBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                    break;
                case 'empty':
                default:
                    emptyState.classList.remove('hidden');
                    break;
            }
        }

        // 相容性高的複製功能 (適用於 iframe 環境)
        function copyResult() {
            const outputText = document.getElementById('outputText').innerText;
            if (!outputText) return;

            const hiddenArea = document.getElementById('hiddenCopyArea');
            hiddenArea.value = outputText;
            
            // 讓隱藏的 textarea 暫時可見並選取
            hiddenArea.classList.remove('sr-only');
            hiddenArea.style.position = 'absolute';
            hiddenArea.style.left = '-9999px';
            
            hiddenArea.select();
            hiddenArea.setSelectionRange(0, 99999); // 支援手機

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    const copyBtnText = document.getElementById('copyText');
                    const originalHTML = document.getElementById('copyBtn').innerHTML;
                    
                    document.getElementById('copyBtn').innerHTML = '<i class="fa-solid fa-check text-emerald-500"></i> <span class="text-emerald-500">已複製</span>';
                    
                    setTimeout(() => {
                        document.getElementById('copyBtn').innerHTML = originalHTML;
                    }, 2000);
                } else {
                    showMessageBox("複製失敗，請手動框選複製。");
                }
            } catch (err) {
                showMessageBox("瀏覽器不支援此複製方式，請手動複製。");
            } finally {
                // 恢復隱藏
                hiddenArea.classList.add('sr-only');
                hiddenArea.style.position = '';
                hiddenArea.style.left = '';
            }
        }

        // 自訂訊息框 (替代 alert)
        function showMessageBox(msg) {
            const existingBox = document.getElementById('custom-msg-box');
            if (existingBox) existingBox.remove();

            const box = document.createElement('div');
            box.id = 'custom-msg-box';
            box.className = 'fixed bottom-4 right-4 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-xl z-50 flex items-center gap-3 transform transition-all translate-y-10 opacity-0';
            box.innerHTML = `<i class="fa-solid fa-bell text-blue-400"></i> <span>${msg}</span>`;
            
            document.body.appendChild(box);
            
            // 動畫顯示
            setTimeout(() => {
                box.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            // 自動隱藏
            setTimeout(() => {
                box.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => box.remove(), 300);
            }, 3000);
        }

        // --- API 呼叫與指數退避重試邏輯 ---
        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            let lastError;

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error?.message || `HTTP 錯誤：${response.status}`);
                    }
                    return data;
                } catch (error) {
                    lastError = error;
                    if (i < maxRetries - 1) {
                        // 等待指定的延遲時間
                        await new Promise(resolve => setTimeout(resolve, delays[i]));
                    }
                }
            }
            throw lastError; // 所有重試皆失敗後拋出錯誤
        }

        async function handleGenerate() {
            const prompt = document.getElementById('promptInput').value.trim();

            if (!prompt) {
                showMessageBox("請先輸入提示詞！");
                return;
            }

            if (!canvasApiKey || canvasApiKey === "YOUR_API_KEY_HERE") {
                showUIState('error', '系統未設定 API 金鑰。請教師在原始碼的 canvasApiKey 變數中填寫有效的 Gemini API 金鑰。');
                return;
            }

            showUIState('loading');

            // 修正：將模型更新為公開穩定的 gemini-2.5-flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${canvasApiKey}`;
            
            const payload = {
                contents: [{
                    parts: [{
                        text: prompt
                    }]
                }],
                systemInstruction: {
                    parts: [{
                        text: "你現在是一個用於教育用途的AI，目的是幫助學生理解不同的國際視角。請嚴格根據使用者的提示詞，模擬特定的語氣、立場和角色來撰寫文章。確保你的回覆始終使用繁體中文（正體字），並且排版清晰易讀。"
                    }]
                }
            };

            try {
                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const generatedText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (generatedText) {
                    showUIState('success', generatedText);
                } else {
                    throw new Error("API 未返回預期的文字內容。");
                }

            } catch (error) {
                console.error("Generation Error:", error);
                showUIState('error', `生成失敗，請檢查金鑰或網路連線。詳細錯誤：${error.message}`);
            }
        }
    </script>
</body>
</html>
